<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 200px;
  height: 100px;
  background-color: blue;
  color: white;
  text-align: center;
  line-height: 100px;
  transition: 0.5s; /* smooth transition */
}

.box:hover {
  background-color: red;
  transform: scale(1.2); /* slightly bigger on hover */
}
</style>
</head>

<body>

<div class="box">Hover me</div>

</body>
</html>
